name: TQQQ Daily Signal

on:
  schedule:
    # 美東 16:30（收盤後半小時）
    - cron: '30 20 * * 1-5'   # 夏令 UTC
    - cron: '30 21 * * 1-5'   # 冬令 UTC
  workflow_dispatch:           # 手動觸發

jobs:
  signal:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install yfinance numpy pandas requests

      - name: Run TQQQ signal
        env:
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          LINE_USER_ID: ${{ secrets.LINE_USER_ID }}
          GH_PAT: ${{ secrets.GH_PAT }}
          GITHUB_REPO: ${{ github.repository }}
          TOTAL_CAPITAL_USD: ${{ secrets.TOTAL_CAPITAL_USD }}
        run: python tqqq_signal.py --line --upload --json
